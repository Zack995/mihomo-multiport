# Replace the sample node values below with your real node details.
mixed-port: 7892
mode: rule
log-level: info
allow-lan: false

proxies:
  - name: "sgp01"
    type: ss
    server: "example-sg.server"
    port: 20002
    cipher: aes-128-gcm
    password: "replace-me"
    plugin: obfs
    plugin-opts:
      mode: http
      host: "www.microsoft.com"
    udp: true
    tfo: false

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "sgp01"

rules:
  - MATCH,PROXY
